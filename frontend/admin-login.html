<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – ChickenMart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #172337 0%, #2c3e50 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      overflow: hidden;
    }
    .card-header {
      background: linear-gradient(135deg, #172337, #2c3e50);
      padding: 28px 24px;
      text-align: center;
    }
    .logo-text { font-size: 24px; font-weight: 800; color: #fff; }
    .logo-sub  { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .shield    { font-size: 36px; margin-bottom: 8px; }

    .card-body { padding: 28px 24px; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #2874f0; }

    .btn {
      width: 100%;
      background: #172337;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }
    .btn:hover { background: #0d1724; transform: translateY(-1px); }
    .btn:disabled { background: #999; cursor: not-allowed; transform: none; }

    .err-msg {
      background: #fde8e8;
      color: #c0392b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 14px;
      display: none;
    }
    .err-msg.show { display: block; }
    .footer-note {
      background: #f8f9fa;
      padding: 12px 24px;
      text-align: center;
      font-size: 12px;
      color: #878787;
      border-top: 1px solid #f0f0f0;
    }
    .footer-note a { color: #2874f0; text-decoration: none; font-weight: 600; }
    .warning-box {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #856404;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="shield">🛡️</div>
    <div class="logo-text">Admin Portal</div>
    <div class="logo-sub">ChickenMart — Restricted Access</div>
  </div>
  <div class="card-body">
    <div class="warning-box">⚠️ This area is for authorized personnel only. Unauthorized access is prohibited.</div>
    <div class="err-msg" id="adminErr"></div>
    <div class="form-group">
      <label>Admin Username</label>
      <input type="text" id="adminUser" placeholder="Enter admin username"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="adminPass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doAdminLogin()"/>
    </div>
    <button class="btn" id="adminBtn" onclick="doAdminLogin()">🔐 Login to Admin Panel</button>
  </div>
  <div class="footer-note">Customer? <a href="login.html">Login here →</a></div>
</div>

<script>
const API = 'https://chick-app.onrender.com/api';

// Redirect if already admin
const tok = localStorage.getItem('cm_admin_token');
if (tok) window.location.href = 'admin.html';

async function doAdminLogin() {
  const username = document.getElementById('adminUser').value.trim();
  const password = document.getElementById('adminPass').value;
  const errEl    = document.getElementById('adminErr');
  const btn      = document.getElementById('adminBtn');
  errEl.classList.remove('show');

  if (!username || !password) { errEl.textContent = 'Enter username and password'; errEl.classList.add('show'); return; }

  btn.disabled = true; btn.textContent = 'Verifying…';
  try {
    const res  = await fetch(`${API}/auth/admin-login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!data.success) { errEl.textContent = data.message; errEl.classList.add('show'); return; }
    localStorage.setItem('cm_admin_token', data.token);
    window.location.href = 'admin.html';
  } catch {
    errEl.textContent = 'Cannot reach server — is it running?';
    errEl.classList.add('show');
  } finally {
    btn.disabled = false; btn.textContent = '🔐 Login to Admin Panel';
  }
}
</script>
</body>
</html>
